<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RISC-V Build Repair Results (Anonymous)</title>
<style>
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 24px; }
  h1 { margin: 0 0 8px; font-size: 22px; }
  .muted { color:#666; font-size:13px; margin-bottom:12px; }
  .toolbar { display:flex; gap:8px; align-items:center; margin:12px 0 16px; flex-wrap:wrap; }
  input[type="search"]{ padding:8px 10px; border:1px solid #ccc; border-radius:8px; min-width:240px; }
  table { border-collapse: collapse; width: 100%; }
  th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; }
  th { cursor: pointer; user-select: none; }
  tr:hover td { background: #fafafa; }
  .tag { padding:2px 8px; border-radius:999px; font-size:12px; border:1px solid #ddd; }
  .ok { background:#e8f9e8; border-color:#bfe6bf; }
  .no { background:#fff3f3; border-color:#ffd6d6; }
</style>
</head>
<body>
  <h1>RISC-V Build Repair Results (Anonymous)</h1>
  <div class="muted">Double-blind preview. No author info; links point to anonymized artifacts.</div>

  <div class="toolbar">
    <input id="q" type="search" placeholder="Search package…" />
  </div>

  <table id="tbl">
    <thead>
      <tr>
        <th data-key="package">package ▾</th>
        <th data-key="link">Link</th>
        <th data-key="result">repair result</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

<script>
// === Editable data (add your rows here) ===
const DATA = [
  { package: "perl-local-lib", link: "https://example.com/build/perl-local-lib", result: "success" },
  { package: "python-qsymm",  link: "https://example.com/build/python-qsymm",  result: "failed"  },
  { package: "mod_wsgi",      link: "https://example.com/build/mod_wsgi",      result: "success" },
  { package: "cjose",         link: "https://example.com/build/cjose",         result: "failed"  },
  { package: "gopass",        link: "https://example.com/build/gopass",        result: "success" }
];

// === Table logic ===
let sortKey = 'package';
let sortAsc = true;

function linkify(url){
  if(!url) return '';
  const safe = url.replace(/"/g,'&quot;');
  return `<a href="${safe}" target="_blank" rel="noopener noreferrer">link</a>`;
}

function badge(val){
  const v = (val||'').toLowerCase();
  return `<span class="tag ${v==='success'?'ok':'no'}">${v || ''}</span>`;
}

function render(){
  const q = document.getElementById('q').value.toLowerCase().trim();
  let rows = DATA.filter(r => (r.package||'').toLowerCase().includes(q));
  rows.sort((a,b)=>{
    const A = (a[sortKey]||'').toString().toLowerCase();
    const B = (b[sortKey]||'').toString().toLowerCase();
    return (A<B ? -1 : A>B ? 1 : 0) * (sortAsc?1:-1);
  });
  document.querySelector('#tbl tbody').innerHTML = rows.map(r=>`
    <tr>
      <td>${r.package||''}</td>
      <td>${linkify(r.link)}</td>
      <td>${badge(r.result)}</td>
    </tr>
  `).join('');
}

document.getElementById('q').addEventListener('input', render);
document.querySelectorAll('th[data-key]').forEach(th=>{
  th.addEventListener('click', ()=>{
    const key = th.getAttribute('data-key');
    if (sortKey === key) sortAsc = !sortAsc; else { sortKey = key; sortAsc = true; }
    document.querySelectorAll('th').forEach(x=>{
      x.textContent = x.textContent.replace(' ▴','').replace(' ▾','');
    });
    th.textContent = th.textContent.replace(/ ▴| ▾/g,'') + (sortAsc?' ▾':' ▴');
    render();
  });
});
render();
</script>
</body>
</html>
